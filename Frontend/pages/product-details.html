<link rel="icon" href="../images/logo.png">

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

    <div class="logo">
        <img src="../images/logo.png" alt="Logo">
        SmartSaver
    </div>

    <ul class="nav-links">

        <li><a href="../index.html">Home</a></li>

        <li><a href="electronics.html">

<!-- PRODUCT DETAILS -->

<section class="details-container">

    <div class="details-image">

        <img
        id="productImage"
        src="../images/no-img.png"
        alt="Product">

    </div>

    <div class="details-content">

        <h2 id="productName">
            Loading...
        </h2>

        <p id="productDescription">
            Loading Description...
        </p>

        <br>

        <h3 id="productPrice">
            ₹0
        </h3>

        <br>

        <h3 id="productRating">
            ⭐ 0
        </h3>

    </div>

</section>


<!-- PRICE COMPARISON -->

<section class="page-content">

    <h2>Price Comparison</h2>

    <table>

        <tr>
            <th>Platform</th>
            <th>Price</th>
            <th>Rating</th>
        </tr>

        <tr>
            <td>Amazon</td>
            <td id="amazonPrice">₹0</td>
            <td>4.8</td>
        </tr>

        <tr>
            <td>Flipkart</td>
            <td id="flipkartPrice">₹0</td>
            <td>4.7</td>
        </tr>

        <tr>
            <td>Croma</td>
            <td id="cromaPrice">₹0</td>
            <td>4.8</td>
        </tr>

    </table>

    <br>

    <h3 id="bestPrice">
        Best Price: ₹0
    </h3>

    <br>

    <button class="apply-filter-btn">
        Buy Now
    </button>

</section>


<!-- SIMILAR PRODUCTS -->

<section class="products">

    <h2>Similar Products</h2>

    <div
    id="similarProducts"
    class="card-container">

    </div>

</section>
